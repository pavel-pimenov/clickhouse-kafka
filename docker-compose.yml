services:
  kafka:
    image: confluentinc/cp-kafka:7.6.3
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "qBrgiFMvS06OIeOXdqfkkQ"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CREATE_TOPICS: "signals-float-3p:3:1,signals-double-3p:3:1,signals-int-3p:3:1,signals-float-5p:5:1,signals-double-5p:5:1,signals-int-5p:5:1"
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 30

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    ports:
      - "19093:9093"
    command:
      - redpanda
      - start
      - --overprovisioned
      - --memory
      - 2G
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9093
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9093
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:8082
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    healthcheck:
      test: curl -f http://localhost:9644/v1/status/ready || exit 1
      interval: 5s
      timeout: 3s
      retries: 15

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_PASSWORD: benchmark
    volumes:
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 3s
      retries: 15

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      KAFKA_BROKER: kafka:9092
      REDPANDA_BROKER: redpanda:9093
      NUM_RECORDS: "100000"
      BATCH_SIZE: "1000"

volumes:
  clickhouse-data:
